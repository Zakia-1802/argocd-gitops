apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: toto
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Zakia-1802/argocd-gitops.git
    path: argoapps
    targetRevision: HEAD
  destination:
    server: https://kubernetes.default.svc
    namespace: toto
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
